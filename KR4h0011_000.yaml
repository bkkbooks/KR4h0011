body:
  text: 御覽詩總集𩔖提要臣等謹案御覽詩一卷一名唐歌詩一名選進集一名元和御覽唐令狐楚編楚字榖士宜州華原人貞元七年登進士第桂管觀察使王拱辟入幕後厯辟太原節度判官召授右拾遺官至吏部尚書檢校尚書左僕射出為山南西道節度使卒於官事迹具唐書本傳是書乃憲宗時奉勅編進其結銜題翰林學士朝議郎守中書舍人考楚本傳稱皇甫鎛與楚厚善薦為翰林學士進中書舍人元和十二年裴度以宰相領彰義節度使楚草制其詞有所不合停楚學士但為中書舍人則此書之進在元和十二年以前也陸游渭南文集有是書跋曰右唐御覽詩一卷凡三十人二百八十九首元和學士令狐楚所集也按盧綸墓碑云元和中章武皇帝命侍臣採詩第名家得三百一十篇公之章句奏御者居十之一今御覽所載綸詩正三十二篇所謂居十之一者也據此則御覽為唐舊本不疑然碑云三百十一篇而此纔二百八十九首蓋散佚多矣云云此本人數詩數均與㳺所跋相合蓋猶古本所録惟韋應物為天寶舊人其餘李端司空曙等皆大厯以下人張籍楊巨源並及於同時之人去取凡例不甚可解其詩惟取近體無一古體即巫山髙等之用樂府題亦皆律詩蓋中唐以後世務以聲病諧婉相尚其奮起而追古調者不過韓愈等數人楚亦限於風氣不能自異也本傳稱楚於牋奏制令尤善每一篇成人皆傳諷舊唐書李商隠傳亦稱楚能章奏以其道授商隠均不稱其詩劉禹錫集和楚詩雖有風情不似四登壇句而今所傳詩一巻惟宫中樂五首從軍詞五首年少行四首差為可觀氣格色澤皆與此集相同蓋取其性之所近其他如郡齋詠懷詩之何時羾閶闔九日言懷詩之二九即重陽立秋日悲懷詩之泉終閉不開秋懷寄錢侍郎詩之燕鴻一聲叫和嚴司空落帽臺宴詩之馬奔流電妓奔車郡齋栽竹詩之退公閒坐對嬋娟青雲干吕詩之瑞容驚不散譏劉白賞春不及之下馬貪趨廣運門皆時作鄙句而贈毛仙翁一首尤拙鈍蓋不甚避俚句者故此集所録如盧綸送道士詩駙馬花燭詩鄭鏦邯鄲俠少年詩楊凌閣前雙槿詩皆頗涉俗格亦其素習然也然大致雍容諧婉不失風格上比篋中集則不足下方才調集則有餘亦不以一二疵累棄其全書矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
