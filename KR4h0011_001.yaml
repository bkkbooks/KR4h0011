body:
  text: 御覽詩唐令狐楚撰劉方平十三首秋夜思旅夢何時盡征途望每賖晚秋淮上水新月楚人家猿嘯空山近鴻飛極浦斜明朝南岸去言折桂枝花泛舟林塘夜發舟蟲響荻颼颼萬影皆因月千聲各為秋嵗華空復晚鄉思不堪愁西北浮雲外伊川何處流折楊枝官渡初楊栁風來亦動搖武昌行路好應為最長條葉映黃鸝夕花繁白雪朝年年攀折意流恨入纎腰班媫妤夕殿别君王深宫月似霜人幽在長信螢出向昭陽露浥紅蘭濕秋凋碧樹傷惟留合歡扇從此篋中藏新春南陌春風早東鄰曙色斜一花開楚國雙燕入盧家眠罷梳雲髻粧成上錦車誰知如昔日更浣越溪紗採蓮落日晴江裏荆歌艷楚腰採蓮從小慣十五即乘潮京兆眉新作蛾眉樣誰將月裏同有來凡幾日相效滿城中春雪飛雪帶春風徘徊亂繞空君看似花處偏在洛陽東望夫石佳人成古石蘚駁覆花黃猶有春山杏枝枝似薄粧送别華亭霽色滿今朝雲裏檣竿去轉遙莫怪山前深復淺清淮一日兩回潮夜月更深月色半人家北斗闌干南斗斜今夜偏知春氣暖蟲聲新透緑窗紗春怨紗窗日落漸黃昏金屋無人見淚痕寂寞空庭春欲晚梨花滿地不開門代春怨朝日殘鶯伴妾啼開簾只見草萋萋庭前時有東風入楊栁千條盡向西皇甫冉十六首江山留别原題潤州南郭留别縈回楓葉岸留滯木蘭橈吳岫新經雨江天正落潮故人勞見愛行客自無聊君問前程事孤雲入剡遙巫山髙巫峽見巴東迢迢出半空雲藏神女館雨到楚王宫朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中長安路長安九城路戚里五侯家結束趨平樂聯翩抵狹斜髙樓臨積水復道出繁花惟有相如宅蓬門度嵗華送客旗鼓軍威重關山客路賒待封甘度隴回首不思家城上春風晚營中瀚海沙河源雖萬里音信寄來查溫湯即事天仗星辰轉霜風景氣和樹含溫液潤山入繚垣多丞相金錢賜平陽玉輦過魯儒求一謁無路獨如何送節度赴朔方原題作送常大夫加散騎常侍赴朔方故壘煙塵後新軍河塞間金貂寵漢將玉節度蕭關散漫沙中雪依稀漢口山人知竇車騎計曰勒銘還歸渡洛水暝色赴春愁歸人南渡頭渚煙空翠合灘月碎光流澧浦饒芳草滄浪有釣舟誰知放歌客此意正悠悠賦得海邊樹歷歷緣荒岸冥冥入逺天每同莎草發長共水雲連搖落潮風早離披海雨偏故傷遊子意多在客舟前婕妤怨由來詠團扇今已值秋風事逐人皆往恩無日再中早鴻聞上苑寒露下深宫顔色年年謝相如賦豈工雨雪風沙悲久戍雨雪更勞師絶漠無人境將軍苦戰時山川迷向背氛霧失旌旗徒念天涯事年年芳草期送客西塞雲山逺東風道路長人心勝潮水相送過潯陽班媫妤花枝出建章鳳管發昭陽借問承恩者雙蛾幾許長秋怨長信多秋氣昭陽借月華那堪閉永巷聞道選良家贈别原題贈寄權三客舍南橋春日暮楊栁帶青渠不得同攜手空成意有餘禁省梨花詠巧解迎人笑偏能亂蝶飛春風時入户幾片落朝衣春思本集不載鶯啼燕語報新年馬邑龍堆路幾千家住秦城鄰漢苑心隨明月到胡天機中錦字論長恨樓上花枝笑獨眠為問元戎竇車騎何時反斾勒燕然劉復四首春逰曲春風戲狹斜相見莫愁家細酌蒲桃酒嬌歌玉樹花裁衫催白紵迎客走朱車不覺重城暮爭栖栁上鴉春雨細雨度深閨鶯愁欲懶啼如煙飛漠漠似露濕萋萋草色行看靡花枝暮欲低曉聽鐘鼓動早送錦障泥雜曲寶劔飾文犀當風似切泥逢君感意氣貰酒杜陵西趙女顔雖少宛駒齒正齊嬌多不肯别更待夜烏啼夏日映日紗窗深且閒含桃紅日石榴殷銀瓶綆轉桐花井沉水煙銷金博山文簟象床嬌倚瑟綵奩銅鏡懶拈環明朝戲去誰相伴年少相逢狹路間鄭錫十首邯鄲少年行霞鞍金口騮豹袖紫貂裘家住叢臺近門前漳水流喚人呈楚舞借客試吳鈎見說秦兵至甘心赴國讐隴頭别秋盡初移幕霑裳一送君據鞍窺古堠開竈爇寒雲登隴人回首臨關馬顧羣從來斷腸處皆向此中分度關山象弭插文犀魚腸瑩鸊鵜水聲分隴咽馬色度關迷曉幕胡沙慘危烽漢月低仍聞數騎將更欲出遼西千里思渭水通胡宛輪臺望漢關帛書秋海斷錦字夜機閒旅夢蟲催曉邉心雁帶還惟餘兩鄉思一夕度關山襄陽樂春生峴首東先暖習池風拂水初含緑驚林未吐紅渚邉逰漢女桑下問龎公磨滅懷中刺曽將示孔融出塞關山落葉秋掩淚望營州遼海雲沙暮幽燕旌斾愁戰餘能送陳身老未封侯去國三千里歸心紅粉樓玉階怨長門寒水流髙殿曉風秋昨夜鴛鴦夢還陪豹尾逰前魚不解泣共輦豈關羞那及輕身燕雙飛上玉樓送客之江西乘軺奉紫泥澤國渺天涯九派春潮滿孤帆暮雨低草深鶯斷續花落水東西更有髙堂處知君路不迷望月髙堂新月明虛殿夕風清素影紗窗霽浮涼羽扇輕稍隨微露滴漸逐曉參橫遙憶雲中詠蕭條空復情出塞曲校尉徵兵出塞西别營分騎過龍溪沙平虜跡風吹盡霧失烽煙道易迷玉靶半開鴻已落金河欲渡馬連嘶㑹當繫取天驕入不使軍書夜刺閨栁中庸九首秋怨玉樹起涼煙凝情一葉前别離傷曉鏡搖落思秋絃漢壘關山月胡笳塞北天不知腸斷夢空繞幾山川春思贈人紅粉當三五青娥艷一雙綺羅回錦陌絃管入花江落㕍驚金彈拋杯瀉玉缸誰知褐衣客憔悴在書窗幽院早春草短花初拆苔青栁半黃隔簾春雨細髙枕曉鶯長無事含閒夢多情識異香欲尋蘇小小何處覔錢塘寒食戲贈春暮越江邉春隂寒食天杏花香麥粥栁絮伴鞦韆酒是芳菲節人當桃李年不知何處恨已解入筝絃聽筝抽絃促柱聽秦筝無限秦人悲怨聲似逐春風知栁態如隨啼鳥識花情誰家獨夜愁燈影何處空樓思月明更入幾重離别恨江南岐路洛陽城河陽橋送别黃河流出有浮橋晉國歸人此路遙若傍闌干千里望北風驅馬雨蕭蕭征怨嵗嵗金河復玉關朝朝馬策與刀環三春白雪歸青塜萬里黃河繞黑山涼州曲關山萬里逺征人一望關山淚滿巾青海戍頭空有月黃沙磧裡本無春又髙檻連天望武威窮隂拂地戍金微九城絃管聲遙發一夜關山雪滿飛李嘉祐二首鄱陽暮秋宋玉悲三秋張衡復四愁思鄉雁北至歎别水東流倚樹看黃葉逢人話白頭佳期不可見落日自登樓漢口春原題春日淇上淇水春來漲鴛鴦逆浪飛清明桑葉小度雨杏花稀衛女紅粧薄王孫白馬肥相將踏青去不解惜羅衣李端八首山下泉碧水映丹霞濺濺露淺沙暗通山下草流出洞中花淨色和雲落喧聲繞石斜明朝更尋去應到阮郎家關山月露濕月蒼蒼關頭榆葉黃回輪照海逺分彩上樓長水凍頻移幕兵疲數望鄉只應城影外萬里共胡霜巫山髙巫山十二峰皆在碧虛中回合雲藏月霏微雨帶風猿聲寒過澗樹色暮連空愁向髙唐去清秋見楚宫送客赴洪州草色隨驄馬悠悠共出秦水傳雲夢曉山接洞庭春帆影連三峽猿聲在四鄰青門一分手難見杜陵人江上逢司空曙共有髫年故相逢萬里餘新春兩行淚故國一封書夏口帆初泊潯陽㕍已踈唯當執杯酒暫食漢江魚與鄭錫逰春東門垂栁長回首獨心傷日暖臨芳草天晴憶故鄉映花鶯上下過水蝶飛揚借問同行客今朝淚幾行送友人聞說湘川路年年弔古多猿啼巫峽夜月照洞庭波窮海人還去孤城㕍與過青山不同賞來往自蹉跎閨情月落星稀天欲明孤燈未滅夢難成披衣更向門前望不忿朝來鵲喜聲盧綸三十二首皇帝感詞提劎風雷動垂衣日月明禁花呈瑞色國老見星精發棹魚先躍窺巢鳥不驚山呼一萬嵗直入九重城又天衣五鳳綵御馬六龍文雨露清馳道風雷翊上軍髙旍花外轉行漏樂前聞時見金鞭舉空中指瑞雲又妙算干戈止神謀宇宙清兩階文物盛七德武功成校獵長楊賦屯軍細栁營歸來獻明主歌舞滿春城又天樂下天中雲軿儼在空鉛黃艷河漢笑語合笙鏞已見長隨鳳仍聞不避熊君王親試舞閶闔靜無風邉思原題送郭判官赴振武黃河九曲流繚繞古邉州鴻雁初飛夜羌胡正早秋淒清金管思迢遞玉人愁七葉雖多慶須懷殺敵憂送都護歸邉好勇知名早爭雄上將間戰多春入塞獵慣夜燒山陳合龍蛇動軍移草木閒今來部曲盡白首過蕭關送道士夢别一仙人霞衣滿鶴身旌幢天路逺梅杏海山春種玉非求稔燒金不為貧自憐頭向白誰與葛洪親送劉判官赴天德軍銜杯吹急管滿眼起風沙大漠山沉雪長城草發花策行須恥戰虜在敢言家余亦求勳者如何别左車七夕涼風吹玉露河漢有幽期星彩光仍隱雲容掩復離長天愁曙早閏嵗怨秋遲何事金閨子空傳得網絲東齊花樹緑砌紅花樹狂風獨未吹光中如有熖密處似無枝鳥動香輕發人愁影屢移今朝數片落為報漢郎知塞下曲鷲翎金僕姑燕尾繡蝥孤獨立揚新令千營共一呼又林暗草驚風將軍夜引弓平明尋白羽沒在石稜中又月黑雁飛髙單于夜遁逃欲將輕騎逐大雪滿弓刀又野幕敞瓊筵羌夷賀勞旋醉和金甲舞雪鼓動山川又調箭又呼鷹俱聞百中能奔猿將迸雉掃盡古丘陵又亭亭七葉貴蕩蕩一隅清他日題麟閣唯應獨不名天長久詞玉砌紅花樹香風不敢吹春光解人意偏發殿南枝天長久萬年昌又虹橋千步廊半在水中央天子方清署宫娃起曉妝天長久萬歲昌又辭輦復當熊傾心奉六宮君王若看貌甘在衆妃中天長久萬嵗昌贈李果毅向日磨金鏃當風著錦衣上城邀賊語走馬截鵰飛春夜對月露如輕雨月如霜不見星河見雁行虛暈入池波自泛滿輪當苑桂偏長春臺幾望黃龍闕雲路寧分白玉郎是夜巴歌應金石豈殊衫影對清光長安春望東風吹雨過青山却望千門草色閒家在夢中何日到春來江上幾人還川原繚繞浮雲外宫闕參差落照間誰念為儒逢世難獨將衰鬢客秦關宫中樂雲日呈祥禮物殊彤庭生獻五單于塞垣萬里無飛鳥可在邊城用郅都又臺殿雲涼秋色微君王初賜六宫衣樓船泛罷歸猶早行遣才人鬭射飛春日有懷桃李風多日欲隂伯勞飛處落花深貧居靜久難逢信知隔春山不可尋駙馬花燭萬條銀燭引天人十月長安半夜春步障三千隘將斷幾多珠翠落香塵又比翼和鳴雙鳳皇玉梅金帳滿城香平明却入甘泉裡日氣曈曈五色光曲江看花紅枝欲折紫枝繁隔水連宫不用攀㑹待長風吹落盡始能開眼向青山春日登樓花正濃時人正愁逢花却欲替花羞年來笑伴皆歸去今日春風欲上樓曲江春望菖蒲翻葉栁交枝暗上蓮舟鳥不知更到無花最深處玉樓金殿影參差又翠黛紅粧畫鷁中共驚雲色帶微風簫管曲長吹未盡花南水北雨濛濛又泉聲遍野入芳洲擁沫吹花上碧流落日行人漸無路巢蜂乳燕滿髙樓李何一首舊刻和非觀妓向晚小乘逰朝來新上頭從來許長袖未有客難留張起一首春情畫閣餘寒在新年舊燕飛梅花猶帶雪未得試春衣鄭鏦四首邯鄲俠少年夜渡濁河津衣中劔滿身兵符劫晉鄙七首刺秦人執事非無膽髙堂念有親昨緣秦苦趙來往大梁頻玉階怨昔日同飛燕今朝似伯勞情深爭擲果寵罷怨殘桃别殿春心斷長門夜樹髙雖能不自悔誰見舊衣褒媫妤怨南國承歡日東方候曉時那能妬褒姒祗愛笑唐兒寶葉隨雲髻珠絲煆履綦不知飛燕意何事苦相疑入塞曲留滯邉庭久歸思嵗月賖黃雲同入塞白首獨還家宛馬隨秦草胡人問漢花還傷李都尉獨自沒黃沙司空曙五首玩花衰鬢千莖雪他鄉一樹花今朝與君醉忘却在長沙别盧綸本集不載見盧允言集原題贈别司空文明有月多同賞無秋不共悲如何與君别又是菊黃時登秦嶺南登秦嶺頭回首始堪憂漢闕青門逺商山藍水流三湘遷客去九陌故人逰從此思鄉淚雙垂不復收江湖秋思原題訓崔峒見寄