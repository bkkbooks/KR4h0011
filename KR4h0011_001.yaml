勒燕然石北地無人空月明避暑女冠霧袖煙裾雲母冠碧花瑶簟井氷寒焚香欲降三青鳥靜掃桐隂上玉壇題宫苑花原題宫怨露濕暗花春殿香月明歌吹在昭陽似將海水添宫漏共滴長門一夜長送客歸幽州惆悵秦城送獨歸薊門雲樹逺依依秋來莫射南飛㕍從遣乘春更北飛拂雲堆漢將新從虜地來旌旗半上拂雲堆單于每向沙場獵南望隂山哭幾回暮過回樂峰烽火髙飛百尺臺黃昏遙自磧南來昔年征戰回應樂今日從軍樂未回夜宴觀石將軍舞微月東南上戍樓琵琶起舞錦纒頭更聞橫笛關山逺白草胡沙西塞秋揚州萬里送客原題栁楊送客青楓天半白蘋洲楚客傷離不待秋君見隋朝更何事栁楊南渡水悠悠春夜聞笛寒山吹笛喚春歸遷客相逢淚落衣洞庭一夜無窮㕍不待天明向北飛度破訥沙眼見風來沙旋移經年不見草生時無論塞北無春色縱有春來何處知上隋堤碧水東流無限春隋家宫苑盡成塵行時莫上長堤望吹起楊花愁殺人舟行栁花吹入正行舟臥引菱花信碧流聞道風光滿楊子天晴共上望鄉樓隋宫燕燕語如傷舊國春宫花旋落已成塵自從一别風光後幾度飛來不見人送人歸嶽陽煙草連天楓樹齊嶽陽歸路子規啼春江萬里巴陵戍落日看沉碧水西古瑟怨破瑟悲秋已减絃湘靈沉怨不知年感君拂拭遺音在更奏新聲明月天詠牡丹贈從兄正封紫蕊叢開未到家却教逰客賞繁華始知年少求名處滿眼空中别有花邉思腰垂錦帶佩吳鈎走馬曽防玉塞秋莫笑關西將家子只將詩思入涼州蜀川聽鶯蜀道山川心易驚緑窗殘夢曉聞鶯分明似寫文君恨萬怨千愁絃上聲暖川胡風凍合鸊鵜泉牧馬千羣逐暖川塞外征行無盡日年年移帳雪中天逢歸信偶寄無事將心寄栁條等閒書字滿芭蕉鄉關若有東流信遣送揚州近驛橋李願二首觀翟玉妓女郎閨閣春抱瑟坐花茵艷粉宜斜燭羞蛾慘向人寄情搖玉柱流眄整羅巾幸以芳香袖承君宛轉塵思婦良人久不至惟恨錦屏孤憔悴衣寬日空房問女巫張籍一首送蜀客蜀客南行祭碧雞木綿花發錦江西山橋日晚行人少時有猩猩上樹啼霍揔六首塞下曲曽當一面戰頻出九重圍但見爭鋒處長須得勝歸雪沾旗尾落風斷節毛稀豈要銘燕石平生重武威關山月珠瓏翡翠床白晳侍中郎五日來花下雙童問道傍到門車馬狹連夜管絃長每笑東家子窺他宋玉墻驄馬青驪八尺髙俠客倚雄豪踏雪生珠汗障泥護錦袍路傍看驟影鞍底卷旋毛豈獨連錢貴酬恩更代勞雉朝飛五色有名翬清晨挾兩雌羣羣飛自樂步步飲相隨覘葉逢人處驚媒妬寵時緑毛春鬭盡强敵願君知採蓮女舟中採蓮女兩兩催粧梳聞早渡江去日髙來起居木芙蓉本自江湖逺常開霜露餘爭春候穠李得水異紅蕖孤秀曽無過當門幸不鋤誰能政搖落繁綵照階除楊憑十八首長安春夜宿開元觀霓裳下晚煙留客杏花前遍問人寰事新從洞府天長松皆掃月老鶴不知年為說蓬灜路雲濤幾處連晚泊江戍旅棹依遙戍清湘急晚流若為南浦宿逢此北風秋雲月孤鴻晚關山幾路愁年年不得意零落對滄洲巴江雨夜五嶺天無㕍三巴客問津紛紛輕漢暮漠漠暗江春青草連湖岸繁花憶楚人芳菲無限路幾夜月明新邉塞行九原臨得水雙足是重城獨許為儒老相憐從騎行細叢榆塞迥髙㸃雁山晴聖主嗤炎漢無心自勒兵樂逰園望月炎靈全盛地明月半秋時今古人同望盈虧節暗移彩凝雙月迥輪度八川遲共惜鳴珂去金波送酒巵千葉桃花千葉桃花勝百花孤榮春晚駐年華若教避俗秦人見知向河源舊侶誇春中泛舟仙郎歸奏過湘東正值三湘二月中惆悵滿川桃杏醉醉看還與曲江同雨中怨秋辭家逺客愴秋風千里寒雲與斷蓬日暮隔山投古寺鐘聲何處雨濛濛秋日獨逰曲江信馬閒過憶所親秋山行盡路無塵主人莫惜松隂醉還有千錢沽酒人寄别晚煙洲霧共蒼蒼河㕍驚飛不作行回斾轉舟行數里歌聲猶自逐清湘邉情新種如今屢請和玉關邉上幸無他欲知北海苦辛處看取節毛餘幾多早發湘中按節鳴笳中貴催紅旌白斾滿船開迎愁湓浦登城望西見荆門積水來海榴海榴殷色透簾櫳看盛看衰意欲同若許三英隨五馬便將濃艷鬬繁紅春情暮雨朝雲幾日歸如絲如霧濕人衣三湘二月春光早莫逐狂風繚亂飛送客往荆州巴丘過日又登城雲水湘東一日平若愛春秋繁露學正逢元凱鎮南荆贈馬錬師心嫌碧落更何從月帔花冠氷雪容行雨若迷歸處路近南惟見祝融峰湘江泛舟湘川洛浦三千里地角天涯南北遙除却同傾百壺外不愁誰奈兩魂銷送别江岸梅花雪不如看君驛馭向南徐相聞不必因來㕍雲裏飛軿落素書揚巨源十四首胡姬詞妍艷照江頭春風好客留當壚知妾慣送酒為郎羞香渡傳蕉扇粧成上竹樓數錢憐皓腕非是不能留春日有贈堤暖栁絲斜風光屬謝家晚心應戀水春恨定因花步逺憐芳草歸遲見綺霞由來感情思獨自惜年華襄陽樂閒隨少年去試上大堤逰畫角栖烏起清絃過客愁碑沉楚山石珠徹漢江秋處處風情好盧家更上樓關山月蒼茫臨故關迢遞照秋山萬里平蕪靜孤城落葉閒露濃棲雁起天逺戍兵還復映征西府光深組練間長城聞笛孤城笛滿林斷續共霜砧夜月降羌淚秋風老將心靜過寒壘遍暗入故關深惆悵梅花落山川不可尋宫燕詞毛衣似錦語如絃日暖爭髙綺陌天幾處野花留不得雙雙飛向御爐前賦得灞岸栁送客楊栁含煙灞岸春年年攀折為行人好風倘借低枝便莫遣青絲掃路塵贈崔駙馬百尺梧桐畫閣齊簫聲落處翠雲低平陽不惜黃金埓細雨花驄踏作泥臨水看花一樹紅花映緑波清明騎馬好經過今朝幾許風吹落聞道蕭郎最惜多折楊栁水邉楊栁麴塵絲立馬煩君折一枝惟有春風最相惜殷勤更向手中吹觀妓人入道荀令歌鐘北里亭翠娥紅粉敞雲屏舞衣施盡餘香在今日花前學誦經又碧玉芳年事冠軍清歌空得隔花聞春來削髮芙蓉寺蟬鬢臨風墮緑雲聽李慿彈箜篌聽奏繁絃玉殿清風傳曲度禁林明君王聽樂梨園暖翻到雲門第幾聲又花咽嬌鶯玉潄泉名髙半在御筵前漢皇欲助人間樂從遣新聲墜九天梁鍠十首天長節日月生天久年年慶一回時平祥不去壽逺節長來連吹千家笛同朝百郡杯願持金殿鏡處處照遺才崔駙馬宅賦詠畫山水扇畫扇出秦樓誰家贈列侯小含吳剡縣輕帶楚揚州掩作山雲暮搖成隴樹秋坐來傳與客漢水又回流觀王美人海圖障子宋玉東家女常懷物外多自從圖渤海誰為覓湘娥白鷺栖脂粉頳魴躍綺羅仍憐轉嬌眼别恨一橫波聞百舌鳥百舌聞他郡間關媚物華斂形藏一葉分響出千花坐愛時褰幌行藏或駐車不須應獨感三載已辭家美人春怨原題美人春臥妾家巫峽陽羅幌寢蘭堂曉日臨窗久春風引夢長落叉仍挂鬢微汗欲消黃縱使朦朧覺魂猶逐楚王狷氏子杏梁初照日碧玉後堂開憶事臨粧笑春嬌滿鏡臺含聲歌扇舉顧影舞腰回别有佳期處青樓客夜來長門怨妾命何偏薄君王去不歸欲令遙見悔樓上試春衣空殿看人入深宫羡鳥飛翻悲因買賦索鏡照空輝名姝詠阿嬌年未多弱體性能和怕重愁拈鏡憐輕喜曵羅臨津雙洛浦對月兩嫦娥獨有荆王殿時時暮雨過艷女詞露井桃花發雙雙燕並飛美人姿態裏春色上羅衣自愛頻開鏡時羞欲掩扉不知行路客遙惹五香歸戲贈歌者白晳歌童子哀音絶又連楚妃臨扇學盧女隔簾傳曉燕喧喉裏春鶯囀舌邉若逢漢武帝還是李延年御覽詩
