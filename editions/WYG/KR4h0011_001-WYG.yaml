body:
  text: 御覽詩唐令狐楚撰劉方平十三首秋夜思旅夢何時盡征途望每賖晩秋淮上水新月楚人家􅆐嘯空山近鴻飛極浦斜明朝南㟁去言折桂枝花泛舟林塘夜發舟蟲響荻颼颼萬影皆因月千聲各為秋嵗華空復晩鄉思不堪愁西北浮雲外伊川何處流折楊枝官渡初楊栁風來亦動摇武昌行路好應為最長條葉暎黄鸝夕花繁白雪朝年年攀折意流恨入纎腰班媫妤夕殿别君王深宫月似霜人幽在長信螢出向昭陽露浥紅蘭濕秋凋碧樹傷惟留合歡扇從此篋中藏新春南陌春風早東隣曙色斜一花開楚國雙燕入盧家眠罷梳雲髻粧成上錦車誰知如昔日更浣越溪紗採蓮落日晴江裏荆歌艶楚腰採蓮從小慣十五即乗潮京兆眉新作蛾眉樣誰將月裏同有來凡幾日相效滿城中春雪飛雪帶春風徘徊亂繞空君看似花處偏在洛陽東望夫石佳人成古石蘚駁覆花黄猶有春山杏枝枝似薄粧送别華亭霽色滿今朝雲裏檣竿去轉遥莫怪山前深復淺清淮一日兩迴潮夜月更深月色半人家北斗闌干南斗斜今夜偏知春氣暖蟲聲新透緑窗紗春怨紗窗日落漸黄昏金屋無人見淚痕寂寞空庭春欲晩梨花滿地不開門代春怨朝日殘鶯伴妾啼開簾只見草萋萋庭前時有東風入楊栁千條盡向西皇甫冉十六首江山留别原題潤州南郭留别縈逥楓葉㟁留滯木蘭橈呉岫新經雨江天正落潮故人勞見愛行客自無聊君問前程事孤雲入剡遥巫山髙巫峽見巴東迢迢出半空雲藏神女館雨到楚王宫朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中長安路長安九城路戚里五侯家結束趨平樂聯翩抵狹斜髙樓臨積水複道出繁花惟有相如宅蓬門度嵗華送客旗鼔軍威重闗山客路賒待封甘度隴迴首不思家城上春風晩營中瀚海沙河源雖萬里音信寄來查温湯即事天仗星辰轉霜風景氣和樹含溫液潤山入繚垣多丞相金錢賜平陽玉輦過魯儒求一謁無路獨如何送節度赴朔方原題作送常大夫加散騎常侍赴朔方故壘煙塵後新軍河塞間金貂寵漢將玉節度蕭闗散漫沙中雪依稀漢口山人知竇車騎計曰勒銘還歸渡洛水暝色赴春愁歸人南渡頭渚煙空翠合灘月碎光流澧浦饒芳草滄浪有釣舟誰知放歌客此意正悠悠賦得海邊樹歴歴緣荒岸冥冥入逺天每同莎草發長共水雲連搖落潮風早離披海雨偏故傷遊子意多在客舟前婕妤怨由來詠團扇今已值秋風事逐人皆徃恩無日再中早鴻聞上苑寒露下深宫顔色年年謝相如賦豈工雨雪風沙悲久戍雨雪更勞師絶漠無人境將軍苦戰時山川迷向背氛霧失旌旗徒念天涯事年年芳草期送客西塞雲山逺東風道路長人心勝潮水相送過潯陽班媫妤花枝出建章鳳管發昭陽借問承恩者雙蛾幾許長秋怨長信多秋氣昭陽借月華那堪閉永巷聞道選良家贈别原題贈寄權三客舎南橋春日暮楊栁帶青渠不得同攜手空成意有餘禁省梨花詠巧解迎人笑偏能亂蝶飛春風時入户幾片落朝衣春思本集不載鶯啼燕語報新年馬邑龍堆路幾千家住秦城隣漢苑心隨明月到胡天機中錦字論長恨樓上花枝笑獨眠為問元戎竇車騎何時反斾勒燕然劉復四首春逰曲春風戲狹斜相見莫愁家細酌蒲桃酒嬌歌玉樹花裁衫催白紵迎客走朱車不覺重城暮争栖栁上鵶春雨細雨度深閨鶯愁欲嬾啼如煙飛漠漠似露濕萋萋草色行看靡花枝暮欲低曉聽鐘鼔動早送錦障泥雜曲寳劔飾文犀當風似切泥逢君感意氣貰酒杜陵西趙女顔雖少宛駒齒正齊嬌多不肯别更待夜烏啼夏日暎日紗窗深且閒含桃紅日石榴殷銀瓶綆轉桐花井沉水煙銷金博山文簟象床嬌倚瑟綵奩銅鏡嬾拈環明朝戲去誰相伴年少相逢狹路間鄭錫十首邯鄲少年行霞鞍金口騮豹袖紫貂裘家住樷臺近門前漳水流喚人呈楚舞借客試呉鈎見説秦兵至甘心赴國讐隴頭别秋盡初移幙霑裳一送君據鞍窺古堠開竈􅋹寒雲登隴人逥首臨闗馬顧羣從來斷腸處皆向此中分度闗山象弭插文犀魚腸瑩鸊鵜水聲分隴咽馬色度闗迷曉幕胡沙慘危烽漢月低仍聞數騎將更欲出遼西千里思渭水通胡宛輪臺望漢闗帛書秋海斷錦字夜機閒旅夢蟲催曉邉心雁帶還惟餘兩鄉思一夕度闗山襄陽樂春生峴首東先煖習池風拂水初含緑驚林未吐紅渚邉逰漢女桑下問龎公磨滅懷中刺曽將示孔融出塞闗山落葉秋掩淚望營州遼海雲沙暮幽燕旌斾愁戰餘能送陣身老未封侯去國三千里歸心紅粉樓玉階怨長門寒水流髙殿曉風秋昨夜鴛鴦夢還陪豹尾逰前魚不解泣共輦豈闗羞那及輕身燕雙飛上玉樓送客之江西乘軺奉紫泥澤國𣺌天涯九派春潮滿孤帆暮雨低草深鶯斷續花落水東西更有髙堂處知君路不迷望月髙堂新月明虛殿夕風清素影紗窗霽浮涼羽扇輕稍随微露滴漸逐曉參横遥憶雲中詠蕭條空復情出塞曲校尉徵兵出塞西别營分騎過龍溪沙平虜跡風吹盡霧失烽煙道易迷玉靶半開鴻已落金河欲渡馬連嘶㑹當繫取天驕入不使軍書夜刺閨栁中庸九首秋怨玉樹起涼煙凝情一葉前别離傷曉鏡摇落思秋絃漢壘闗山月胡笳塞北天不知腸斷夢空遶幾山川春思贈人紅粉當三五青娥艷一雙綺羅逥錦陌絃管入花江落㕍驚金彈抛盃瀉玉缸誰知褐衣客顦顇在書窗幽院早春草短花初拆苔青栁半黄隔簾春雨細髙枕曉鶯長無事含閒夢多情識異香欲尋蘇小小何處覔錢塘寒食戲贈春暮越江邉春隂寒食天杏花香麥粥栁絮伴鞦韆酒是芳菲節人當桃李年不知何處恨已解入筝絃聽筝抽絃促柱聽秦筝無限秦人悲怨聲似逐春風知栁態如隨啼鳥識花情誰家獨夜愁燈影何處空樓思月明更入幾重離别恨江南岐路洛陽城河陽橋送别黄河流出有浮橋晉國歸人此路遥若傍闌干千里望北風驅馬雨蕭蕭征怨嵗嵗金河復玉闗朝朝馬策與刀環三春白雪歸青塜萬里黄河遶黒山涼州曲闗山萬里逺征人一望闗山淚滿巾青海戍頭空有月黄沙磧裡本無春又髙檻連天望武威窮隂拂地戍金微九城絃管聲遥發一夜闗山雪滿飛李嘉祐二首鄱陽暮秋宋玉悲三秋張衡復四愁思鄉雁北至歎别水東流倚樹看黄葉逢人話白頭佳期不可見落日自登樓漢口春原題春日淇上淇水春來漲鴛鴦逆浪飛清明桑葉小度雨杏花稀衛女紅粧薄王孫白馬肥相將踏青去不解惜羅衣李端八首山下泉碧水暎丹霞濺濺露淺沙暗通山下草流出洞中花浄色和雲落喧聲遶石斜明朝更尋去應到阮郎家闗山月露濕月蒼蒼闗頭榆葉黄逥輪照海逺分彩上樓長水凍頻移幕兵疲數望鄉只應城影外萬里共胡霜巫山髙巫山十二峰皆在碧虛中逥合雲藏月霏微雨帶風猿聲寒過澗樹色暮連空愁向髙唐去清秋見楚宫送客赴洪州草色隨驄馬悠悠共出秦水傳雲夢曉山接洞庭春帆影連三峽猿聲在四隣青門一分手難見杜陵人江上逢司空􅍼共有髫年故相逢萬里餘新春兩行淚故國一封書夏口帆初泊潯陽㕍已踈唯當執盃酒暫食漢江魚與鄭錫逰春東門垂栁長逥首獨心傷日煖臨芳草天晴憶故鄉暎花鸎上下過水蝶飛揚借問同行客今朝淚幾行送友人聞説湘川路年年弔古多猿啼巫峽夜月照洞庭波窮海人還去孤城㕍與過青山不同賞來往自蹉跎閨情月落星稀天欲明孤燈未滅夢難成披衣更向門前望不忿朝來鵲喜聲盧綸三十二首皇帝感詞提劎風雷動垂衣日月明禁花呈瑞色國老見星精發棹魚先躍窺巢鳥不驚山呼一萬嵗直入九重城又天衣五鳳綵御馬六龍文雨露清馳道風雷翊上軍髙旍花外轉行漏樂前聞時見金鞭舉空中指瑞雲又妙算干戈止神謀宇宙清兩階文物盛七德武功成校獵長楊賦屯軍細栁營歸來獻明主歌舞滿春城又天樂下天中雲軿儼在空鈆黄艶河漢笑語合笙鏞已見長随鳳仍聞不避熊君王親試舞閶闔静無風邉思原題送郭判官赴振武黄河九曲流繚繞古邉州鴻雁初飛夜羌胡正早秋淒清金管思迢逓玉人愁七葉雖多慶湏懐殺敵憂送都䕶歸邉好勇知名早争雄上將間戰多春入塞獵慣夜燒山陣合龍蛇動軍移草木閒今來部曲盡白首過蕭闗送道士夢别一仙人霞衣滿鶴身旌幢天路逺梅杏海山春種玉非求稔燒金不為貧自憐頭向白誰與葛洪親送劉判官赴天德軍銜盃吹急管滿眼起風沙大漠山沉雪長城草發花策行湏恥戰虜在敢言家余亦求勲者如何别左車七夕涼風吹玉露河漢有幽期星彩光仍隐雲容掩復離長天愁曙早閏嵗怨秋遲何事金閨子空傳得網絲東齋花樹緑砌紅花樹狂風獨未吹光中如有熖宻處似無枝鳥動香輕發人愁影屢移今朝數片落為報漢郎知塞下曲鷲翎金僕姑燕尾繡蝥孤獨立揚新令千營共一呼又林暗草驚風將軍夜引弓平明尋白羽沒在石稜中又月黑雁飛髙單于夜遯逃欲將輕騎逐大雪滿弓刀又野幕敞瓊筵羌夷賀勞旋醉和金甲舞雪鼔動山川又調箭又呼鷹俱聞百中能奔猿將迸雉埽盡古丘陵又亭亭七葉貴蕩蕩一隅清他日題麟閣唯應獨不名天長久詞玉砌紅花樹香風不敢吹春光解人意偏發殿南枝天長久萬年昌又虹橋千步廊半在水中央天子方清署宫娃起曉妝天長久萬歳昌又辭輦復當熊傾心奉六宮君王若看貌甘在衆妃中天長久萬嵗昌贈李果毅向日磨金鏃當風著錦衣上城邀賊語走馬截鵰飛春夜對月露如輕雨月如霜不見星河見雁行虛暈入池波自泛滿輪當苑桂偏長春臺幾望黄龍闕雲路寧分白玉郎是夜巴歌應金石豈殊衫影對清光長安春望東風吹雨過青山却望千門草色閒家在夢中何日到春來江上幾人還川原繚繞浮雲外宫闕參差落照間誰念為儒逢世難獨將衰鬢客秦闗宫中樂雲日呈祥禮物殊彤庭生獻五單于塞垣萬里無飛鳥可在邊城用郅都又臺殿雲涼秋色微君王初賜六宫衣樓船泛罷歸猶早行遣才人鬭射飛春日有懷桃李風多日欲隂伯勞飛處落花深貧居静久難逢信知隔春山不可尋駙馬花燭萬條銀燭引天人十月長安半夜春步障三千隘將斷幾多珠翠落香塵又比翼和鳴雙鳳皇玉梅金帳滿城香平明却入甘泉裡日氣曈曈五色光曲江看花紅枝欲折紫枝繁隔水連宫不用攀㑹待長風吹落盡始能開眼向青山春日登樓花正濃時人正愁逢花却欲替花羞年來笑伴皆歸去今日春風欲上樓曲江春望菖蒲翻葉栁交枝暗上蓮舟鳥不知更到無花最深處玉樓金殿影參差又翠黛紅粧畵鷁中共驚雲色帶微風簫管曲長吹未盡花南水北雨濛濛又泉聲遍野入芳洲擁沬吹花上碧流落日行人漸無路巢蜂乳燕滿髙樓李何一首舊刻和非觀妓向晩小乘逰朝來新上頭從來許長袖未有客難留張起一首春情畵閣餘寒在新年舊燕飛梅花猶帶雪未得試春衣鄭鏦四首邯鄲俠少年夜渡濁河津衣中劔滿身兵符刼晉鄙七首刺秦人執事非無膽髙堂念有親昨縁秦苦趙來往大梁頻玉階怨昔日同飛燕今朝似伯勞情􅀷争擲果寵罷怨殘桃别殿春心斷長門夜樹髙雖能不自悔誰見舊衣褒媫妤怨南國承歡日東方候曉時那能妬褒姒祗愛笑唐兒寳葉随雲髻珠絲鍜履綦不知飛燕意何事苦相疑入塞曲留滯邉庭久歸思嵗月賖黄雲同入塞白首獨還家宛馬随秦草胡人問漢花還傷李都尉獨自沒黄沙司空􅍼五首翫花衰鬢千莖雪他鄉一樹花今朝與君醉忘却在長沙别盧綸本集不載見盧允言集原題贈别司空文明有月多同賞無秋不共悲如何與君别又是菊黄時登秦嶺南登秦嶺頭逥首始堪憂漢闕青門逺商山藍水流三湘遷客去九陌故人逰從此思鄉淚雙垂不復收江湖秋思原題訓崔峒見寄